<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tower – Brand</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../tokens.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%23e61d2b' width='32' height='32' rx='4'/><text x='16' y='24' text-anchor='middle' font-size='22' font-weight='bold' fill='white' font-family='serif'>T</text></svg>">
  <style>
    body {
      color: #fff;
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 640px;
    }

    .logo {
      font-family: var(--font-display);
      font-size: clamp(4rem, 12vw, 7rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--red);
      margin-bottom: 1.5rem;
    }

    .subtitle {
      font-size: 0.85rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="logo">Tower</h1>
    <p class="subtitle">Brand</p>
  </div>
</body>
</html>
